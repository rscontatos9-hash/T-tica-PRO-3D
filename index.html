<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tática Futebol</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none}
    body{background:linear-gradient(160deg,#0c1a12 0%,#081410 50%,#0b1e14 100%);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;font-family:'Poppins','Segoe UI',system-ui,sans-serif;padding:12px;overflow-x:auto}
    .tactical-board{background:linear-gradient(145deg,#1c1c1c,#141414);border-radius:1.25rem;box-shadow:0 30px 60px rgba(0,0,0,0.65),0 0 0 1px rgba(255,255,255,0.04);padding:0.85rem;display:inline-flex;flex-direction:column;gap:0.65rem;max-width:540px;width:100%}
    .field-perspective{display:flex;justify-content:center;position:relative;width:100%}
    .field-perspective.active{perspective:1200px;perspective-origin:50% 40%}
    .field-3d-shadow{display:none;position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);width:75%;height:36px;background:radial-gradient(ellipse,rgba(0,0,0,0.45) 0%,transparent 70%);filter:blur(12px);pointer-events:none;z-index:0}
    .field-perspective.active .field-3d-shadow{display:block}
    .field-wrapper{position:relative;width:100%;max-width:480px;margin:0 auto;background-color:#146c43;border-radius:10px;overflow:visible;border:3px solid #ffffff;cursor:crosshair;aspect-ratio:9/16;box-shadow:0 8px 28px rgba(0,0,0,0.45);transform-origin:center center;transition:transform 0.3s ease}
    .field-perspective.active .field-wrapper{transform-style:preserve-3d;transition:transform 0.4s cubic-bezier(0.4,0,0.2,1)}
    .field-perspective.active .pieces-container{transform:translateZ(5px);overflow:visible}
    .field-perspective.active .player-piece{transform:translate(-50%,-50%) translateZ(4px)}
    .field-perspective.active .player-piece:active{transform:translate(-50%,-50%) scale(0.95) translateZ(4px)}
    @media(max-width:550px){.field-wrapper{max-width:380px}}
    @media(max-width:450px){.field-wrapper{max-width:320px}}
    .pitch-canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;pointer-events:none;z-index:1}
    .pieces-container{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;overflow:hidden;pointer-events:none}

    /* ===== JOGADORES 3D VIBRANTES ===== */
    .player-piece{position:absolute;width:min(48px,6.5vw);height:min(52px,7vw);transform:translate(-50%,-50%);cursor:grab;touch-action:none;pointer-events:auto;z-index:20;transition:filter 0.1s ease}
    .player-piece:active{cursor:grabbing;transform:translate(-50%,-50%) scale(0.95)}
    .player-figure{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;filter:drop-shadow(0 6px 8px rgba(0,0,0,0.5))}
    .player-figure::before{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:65%;height:12%;background:rgba(0,0,0,0.35);border-radius:50%;filter:blur(3px);z-index:0}
    .player-head{width:58%;height:40%;background:radial-gradient(circle at 35% 35%,#ffe0bd,#e0b586 60%,#c49a6c);border-radius:50%;border:1px solid rgba(0,0,0,0.15);margin-bottom:-4px;z-index:2;position:relative;box-shadow:inset 0 -3px 6px rgba(0,0,0,0.2),0 1px 2px rgba(0,0,0,0.2)}
    .player-head::after{content:'';position:absolute;top:15%;left:22%;width:30%;height:25%;background:rgba(255,255,255,0.6);border-radius:50%;filter:blur(1.5px)}
    .player-body{width:82%;height:52%;border-radius:32% 32% 22% 22%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:clamp(0.8rem,3.2vw,1.1rem);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.6);position:relative;border:1px solid rgba(255,255,255,0.4);z-index:1;overflow:hidden}
    .player-body::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;border-radius:inherit;background:linear-gradient(140deg,rgba(255,255,255,0.35) 0%,transparent 45%,rgba(0,0,0,0.25) 100%);z-index:1;pointer-events:none}
    .player-number{font-weight:800;font-size:inherit;background:rgba(0,0,0,0.35);padding:0 5px;border-radius:20px;backdrop-filter:blur(2px);z-index:2;position:relative}
    .player-piece.goalkeeper .player-body::after{content:"🧤";position:absolute;font-size:0.65rem;right:-9px;top:-9px;background:rgba(0,0,0,0.6);border-radius:50%;padding:2px;line-height:1;z-index:3}
    .player-piece.hidden-team{display:none}

    /* ===== TOOLBAR ===== */
    .toolbar{display:flex;flex-direction:column;gap:0.5rem}
    .toolbar-row{display:flex;justify-content:center;align-items:center;gap:0.5rem;flex-wrap:wrap}
    .title{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.55);padding:5px 14px;border-radius:60px;backdrop-filter:blur(6px)}
    .title span{font-size:0.85rem}
    .title h2{font-size:0.9rem;color:#fff;font-weight:700;letter-spacing:0.5px}
    .formations-panel{display:flex;gap:0.6rem;flex-wrap:wrap;justify-content:center}
    .formation-control{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:32px;transition:background 0.3s}
    .formation-control label{font-weight:700;color:rgba(255,255,255,0.85);font-size:0.72rem;white-space:nowrap}
    .formation-control select{background:rgba(0,0,0,0.5);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:3px 8px;font-weight:600;font-size:0.7rem;cursor:pointer;font-family:'Poppins',monospace}
    .formation-control select:focus{outline:none;border-color:rgba(255,255,255,0.5)}
    .color-palette{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
    .swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s,transform 0.15s;flex-shrink:0}
    .swatch:hover{transform:scale(1.15)}
    .swatch.active{border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,0.4)}
    .custom-color-input{width:18px;height:18px;border:none;border-radius:50%;cursor:pointer;background:transparent;padding:0;overflow:hidden;flex-shrink:0}
    .custom-color-input::-webkit-color-swatch-wrapper{padding:0}
    .custom-color-input::-webkit-color-swatch{border:2px solid rgba(255,255,255,0.3);border-radius:50%}
    .tools-group{display:flex;align-items:center;gap:0.4rem;background:rgba(0,0,0,0.4);padding:4px 8px;border-radius:40px;backdrop-filter:blur(4px);flex-wrap:wrap;justify-content:center}
    .tools-group-label{font-size:0.6rem;font-weight:600;color:rgba(255,255,255,0.5);white-space:nowrap}
    .pen-size-btn{width:30px;height:28px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;transition:all 0.15s;padding:0}
    .pen-size-btn:hover{background:rgba(255,255,255,0.15)}
    .pen-size-btn.active{background:rgba(230,180,50,0.3);border-color:#e6b432}
    .pen-size-btn svg{display:block}
    .draw-color-input{width:22px;height:22px;border:none;border-radius:50%;cursor:pointer;background:transparent;padding:0}
    .draw-color-input::-webkit-color-swatch-wrapper{padding:0}
    .draw-color-input::-webkit-color-swatch{border:2px solid rgba(255,255,255,0.3);border-radius:50%}
    button{background:linear-gradient(145deg,#1a3d28,#153020);border:1px solid rgba(255,255,255,0.1);padding:5px 14px;border-radius:40px;font-weight:600;font-size:0.72rem;color:#fff;cursor:pointer;box-shadow:0 3px 0 #0a1f14;transition:all 0.08s linear;font-family:'Poppins',sans-serif;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    button:hover{background:linear-gradient(145deg,#224a32,#1a3d28)}
    button:active{transform:translateY(2px);box-shadow:0 1px 0 #0a1f14}
    .draw-mode-active{background:linear-gradient(145deg,#c0691e,#a35818)!important;border-color:#ffd966!important;box-shadow:0 0 0 2px #ffd966,0 3px 0 #6b3a0e!important}
    .save-btn{background:linear-gradient(145deg,#1a4a6b,#133a55)!important;box-shadow:0 3px 0 #0a2233!important}
    .save-btn:hover{background:linear-gradient(145deg,#205a80,#1a4a6b)!important}
    .btn-3d{background:linear-gradient(145deg,#4a1d6b,#33134a)!important;box-shadow:0 3px 0 #1a0a28!important}
    .btn-3d:hover{background:linear-gradient(145deg,#5a2880,#4a1d6b)!important}
    .btn-3d-active{background:linear-gradient(145deg,#b45309,#92400e)!important;border-color:#fbbf24!important;box-shadow:0 0 0 2px #fbbf24,0 3px 0 #5c2d06!important}
    .zoom-btn{background:linear-gradient(145deg,#065f46,#064e3b)!important;box-shadow:0 3px 0 #022c22!important}
    .zoom-btn:hover{background:linear-gradient(145deg,#047857,#065f46)!important}
    .hide-group{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.4);padding:4px 10px;border-radius:32px;backdrop-filter:blur(4px)}
    .hide-group label{font-weight:600;color:rgba(255,255,255,0.5);font-size:0.65rem;white-space:nowrap}
    .hide-team-select{background:rgba(0,0,0,0.5);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:3px 8px;font-weight:600;font-size:0.68rem;cursor:pointer;font-family:'Poppins',monospace}
    .info{background:rgba(0,0,0,0.45);backdrop-filter:blur(5px);padding:4px 14px;border-radius:50px;color:rgba(255,255,255,0.5);font-size:0.62rem;font-weight:500;white-space:nowrap;text-align:center}
    .controls-3d{max-height:0;overflow:hidden;opacity:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);border-radius:12px;border:1px solid rgba(255,255,255,0.05);transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1),opacity 0.3s ease,padding 0.4s ease;padding:0 14px;margin:0}
    .controls-3d.active{max-height:180px;opacity:1;padding:10px 14px;margin:0}
    .angle-presets{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
    .preset-btn{padding:4px 11px;font-size:0.62rem;border-radius:20px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.75);cursor:pointer;transition:all 0.15s;font-family:'Poppins',sans-serif;font-weight:600;box-shadow:none}
    .preset-btn:hover{background:rgba(255,255,255,0.14);color:#fff}
    .preset-btn:active{transform:translateY(1px);box-shadow:none}
    .preset-btn.active-preset{background:rgba(230,180,50,0.25);border-color:#e6b432;color:#ffd966}
    .sliders-3d{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:center}
    .slider-group{display:flex;align-items:center;gap:5px}
    .slider-group label{font-size:0.6rem;color:rgba(255,255,255,0.45);font-weight:600;white-space:nowrap;min-width:52px}
    .slider-group input[type="range"]{width:75px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.12);border-radius:2px;outline:none}
    .slider-group input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#e6b432;cursor:pointer;border:2px solid #fff}
    .slider-group input[type="range"]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#e6b432;cursor:pointer;border:2px solid #fff}
    .slider-val{font-size:0.58rem;color:rgba(255,255,255,0.4);font-weight:600;min-width:26px;text-align:right}
    .auto-rotate-btn{padding:4px 11px;font-size:0.62rem;border-radius:20px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.75);cursor:pointer;font-family:'Poppins',sans-serif;font-weight:600;transition:all 0.15s;box-shadow:none}
    .auto-rotate-btn:hover{background:rgba(255,255,255,0.14);color:#fff}
    .auto-rotate-btn:active{transform:translateY(1px);box-shadow:none}
    .auto-rotate-btn.rotating{background:rgba(34,197,94,0.25);border-color:#22c55e;color:#86efac}

    /* ===== OVERLAY AMPLIAR ===== */
    .zoom-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:9999;display:none;justify-content:center;align-items:center;flex-direction:column;cursor:pointer}
    .zoom-overlay.active-zoom{display:flex}
    .zoom-close{position:absolute;top:20px;right:20px;background:rgba(255,0,0,0.6);border:none;color:#fff;font-size:1.5rem;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:sans-serif;transition:0.2s}
    .zoom-close:hover{background:rgba(255,0,0,0.9);transform:scale(1.1)}
    .zoom-field-container{width:90vmin;max-width:600px;aspect-ratio:9/16;transform:scale(1);transition:transform 0.3s ease;pointer-events:none;position:relative}

    @media(max-width:700px){.formations-panel{width:100%;justify-content:space-between}.formation-control select{font-size:0.65rem;padding:2px 5px}.info{white-space:normal;font-size:0.58rem;text-align:center}.title h2{font-size:0.8rem}.player-piece{width:min(40px,7vw);height:min(44px,7.8vw)}button{padding:4px 10px;font-size:0.65rem}.swatch{width:15px;height:15px}.custom-color-input{width:15px;height:15px}.slider-group input[type="range"]{width:60px}}
  </style>
</head>
<body>
<div class="tactical-board">
  <div class="field-perspective" id="fieldPerspective">
    <div class="field-3d-shadow"></div>
    <div class="field-wrapper" id="fieldWrapper">
      <canvas id="pitchCanvas" class="pitch-canvas"></canvas>
      <div id="piecesContainer" class="pieces-container"></div>
    </div>
  </div>
  <div class="controls-3d" id="controls3d">
    <div class="angle-presets" id="anglePresets">
      <button class="preset-btn active-preset" data-rx="0" data-ry="0" data-zoom="100">Superior</button>
      <button class="preset-btn" data-rx="40" data-ry="0" data-zoom="90">Inclinado</button>
      <button class="preset-btn" data-rx="55" data-ry="-12" data-zoom="85">TV</button>
      <button class="preset-btn" data-rx="35" data-ry="30" data-zoom="80">Canto</button>
      <button class="preset-btn" data-rx="65" data-ry="0" data-zoom="75">Panorâmico</button>
      <button class="preset-btn" data-rx="50" data-ry="-40" data-zoom="80">Lateral</button>
    </div>
    <div class="sliders-3d">
      <div class="slider-group"><label>Inclinar X</label><input type="range" id="rotX" min="0" max="75" value="0"><span class="slider-val" id="rotXVal">0°</span></div>
      <div class="slider-group"><label>Girar Y</label><input type="range" id="rotY" min="-60" max="60" value="0"><span class="slider-val" id="rotYVal">0°</span></div>
      <div class="slider-group"><label>Zoom</label><input type="range" id="zoom3d" min="50" max="110" value="100"><span class="slider-val" id="zoomVal">100%</span></div>
      <button class="auto-rotate-btn" id="autoRotateBtn">⟳ Auto-girar</button>
    </div>
  </div>
  <div class="toolbar">
    <div class="toolbar-row">
      <div class="title"><span>⚽</span><h2>TÁTICA FUTEBOL</h2><span>🧑‍🏫</span></div>
    </div>
    <div class="toolbar-row">
      <div class="formations-panel">
        <div class="formation-control" id="blueFormationBox" style="background:rgba(30,58,138,0.7);">
          <label>TIME A</label>
          <select id="blueFormationSelect">
            <option value="442">4-4-2</option><option value="433">4-3-3</option><option value="4231">4-2-3-1</option><option value="352">3-5-2</option><option value="532">5-3-2</option><option value="4141">4-1-4-1</option><option value="343">3-4-3</option><option value="4222">4-2-2-2</option><option value="3241">3-2-4-1</option><option value="235">2-3-5</option>
          </select>
          <div class="color-palette" id="bluePalette"></div>
        </div>
        <div class="formation-control" id="redFormationBox" style="background:rgba(153,27,27,0.7);">
          <label>TIME B</label>
          <select id="redFormationSelect">
            <option value="442">4-4-2</option><option value="433">4-3-3</option><option value="4231">4-2-3-1</option><option value="352">3-5-2</option><option value="532">5-3-2</option><option value="4141">4-1-4-1</option><option value="343">3-4-3</option><option value="4222">4-2-2-2</option><option value="3241">3-2-4-1</option><option value="235">2-3-5</option>
          </select>
          <div class="color-palette" id="redPalette"></div>
        </div>
      </div>
    </div>
    <div class="toolbar-row">
      <div class="tools-group">
        <span class="tools-group-label">CANETA</span>
        <button class="pen-size-btn" data-size="2" title="Fino"><svg width="18" height="18" viewBox="0 0 18 18"><line x1="3" y1="9" x2="15" y2="9" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/></svg></button>
        <button class="pen-size-btn active" data-size="4" title="Médio"><svg width="18" height="18" viewBox="0 0 18 18"><line x1="3" y1="9" x2="15" y2="9" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/></svg></button>
        <button class="pen-size-btn" data-size="8" title="Grosso"><svg width="18" height="18" viewBox="0 0 18 18"><line x1="3" y1="9" x2="15" y2="9" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg></button>
        <input type="color" id="drawColorInput" class="draw-color-input" value="#FFD966" title="Cor do traço">
      </div>
      <button id="drawBtn">✏️ DESENHAR</button>
      <button id="clearDrawBtn">🗑️ LIMPAR</button>
      <button id="saveBtn" class="save-btn">💾 SALVAR</button>
      <button id="btn3d" class="btn-3d">🔲 3D</button>
      <button id="zoomBtn" class="zoom-btn">🔍 AMPLIAR</button>
      <button id="resetBtn">⟳ RESETAR</button>
      <div class="hide-group">
        <label>🙈 OCULTAR</label>
        <select id="hideTeamSelect" class="hide-team-select">
          <option value="none">Nenhum</option><option value="blue">Time A</option><option value="red">Time B</option>
        </select>
      </div>
    </div>
    <div class="toolbar-row" style="justify-content:center">
      <div class="info">🧤 Arraste todos os jogadores inclusive goleiros · ✏️ Clique DESENHAR e use a caneta no campo · 💾 Salve sua tática como imagem</div>
    </div>
  </div>
</div>

<!-- Overlay para Ampliar -->
<div class="zoom-overlay" id="zoomOverlay">
  <button class="zoom-close" id="zoomClose">✕</button>
  <div class="zoom-field-container" id="zoomContainer"></div>
</div>

<script>
  var PALETTE_COLORS=['#3b82f6','#ef4444','#22c55e','#eab308','#f97316','#a855f7','#ec4899','#06b6d4','#1f2937','#f8fafc'];
  var teamColors={blue:{main:'#3b82f6',dark:'#1e3a8a'},red:{main:'#ef4444',dark:'#991b1b'}};
  
  function lightenColor(hex,amt){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return '#'+[r,g,b].map(function(c){return c.toString(16).padStart(2,'0')}).join('');}
  function darkenColor(hex,amt){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);return '#'+[r,g,b].map(function(c){return c.toString(16).padStart(2,'0')}).join('');}

  function updateTeamColor(team,color){
    var light=lightenColor(color,65);
    teamColors[team]={main:color,dark:darkenColor(color,60),light:light};
    piecesState.filter(function(p){return p.team===team}).forEach(function(p){
      p.element.querySelector('.player-body').style.background='radial-gradient(circle at 35% 25%, '+light+', '+color+' 50%, '+darkenColor(color,60)+')';
    });
    var box=document.getElementById(team==='blue'?'blueFormationBox':'redFormationBox');
    if(box)box.style.background=color+'b3';
    buildPalette(team,color);
  }
  function buildPalette(team,activeColor){var container=document.getElementById(team==='blue'?'bluePalette':'redPalette');container.innerHTML='';PALETTE_COLORS.forEach(function(c){var s=document.createElement('div');s.className='swatch'+(c===activeColor?' active':'');s.style.background=c;s.addEventListener('click',function(){updateTeamColor(team,c)});container.appendChild(s)});var inp=document.createElement('input');inp.type='color';inp.value=activeColor;inp.className='custom-color-input';inp.title='Cor personalizada';inp.addEventListener('input',function(e){updateTeamColor(team,e.target.value)});container.appendChild(inp);}

  var GOALIE_POS={blue:{left:50,top:97.25},red:{left:50,top:2.75}};
  var formacoes={

  function createPieces(){

    function addPiece(team,number){
      var isG=number===1;var div=document.createElement('div');
      div.className='player-piece '+team+'-team'+(isG?' goalkeeper':'');
      div.setAttribute('data-team',team);div.setAttribute('data-number',number);div.setAttribute('data-goalie',isG);
      var figure=document.createElement('div');figure.className='player-figure';
      var head=document.createElement('div');head.className='player-head';
      var body=document.createElement('div');body.className='player-body';
      var col=teamColors[team];
      body.style.background='radial-gradient(circle at 35% 25%, '+lightenColor(col.main,65)+', '+col.main+' 50%, '+darkenColor(col.main,60)+')';
      var numSpan=document.createElement('span');numSpan.className='player-number';numSpan.textContent=number;
      body.appendChild(numSpan);figure.appendChild(head);figure.appendChild(body);div.appendChild(figure);
      div.style.left='50%';div.style.top='50%';
      div.addEventListener('mousedown',onDragStart);div.addEventListener('touchstart',onDragStart,{passive:false});
      container.appendChild(div);
      return{id:team+'-'+number,team:team,number:number,leftPct:50,topPct:50,element:div,isGoalie:isG};
    }
    for(var i=1;i<=11;i++){piecesState.push(addPiece('blue',i));piecesState.push(addPiece('red',i));}
    applyFormation('blue',currentBlueFormation);applyFormation('red',currentRedFormation);fixGoalies();applyTeamVisibility();
  }

  // ======================== ARRASTO ========================
  function onDragStart(e){if(activeDrag||is3DMode||isZoomed)return;e.preventDefault();e.stopPropagation();var cx,cy;if(e.type==='mousedown'){cx=e.clientX;cy=e.clientY}else{cx=e.touches[0].clientX;cy=e.touches[0].clientY}var target=e.currentTarget;var pieceId=target.getAttribute('data-team')+'-'+target.getAttribute('data-number');var piece=piecesState.find(function(p){return p.id===pieceId;});if(!piece)return;currentPiece=piece;var rect=target.getBoundingClientRect();currentPiece._dragOffsetX=cx-(rect.left+rect.width/2);currentPiece._dragOffsetY=cy-(rect.top+rect.height/2);activeDrag=true;target.style.zIndex='999';target.style.cursor='grabbing';window.addEventListener('mousemove',onDragMove);window.addEventListener('mouseup',onDragEnd);window.addEventListener('touchmove',onDragMove,{passive:false});window.addEventListener('touchend',onDragEnd);window.addEventListener('touchcancel',onDragEnd);}
  function onDragMove(e){if(!activeDrag||!currentPiece)return;e.preventDefault();var cx,cy;if(e.type==='mousemove'){cx=e.clientX;cy=e.clientY}else if(e.type==='touchmove'){cx=e.touches[0].clientX;cy=e.touches[0].clientY}else return;var rect=container.getBoundingClientRect();var elem=currentPiece.element;var pw=elem.offsetWidth,ph=elem.offsetHeight;if(rect.width===0)return;var dx=cx-currentPiece._dragOffsetX,dy=cy-currentPiece._dragOffsetY;var clx=Math.min(rect.right-pw,Math.max(rect.left,dx));var cly=Math.min(rect.bottom-ph,Math.max(rect.top,dy));currentPiece.leftPct=Math.min(100,Math.max(0,((clx-rect.left)/rect.width)*100));currentPiece.topPct=Math.min(100,Math.max(0,((cly-rect.top)/rect.height)*100));elem.style.left=currentPiece.leftPct+'%';elem.style.top=currentPiece.topPct+'%';}
  function onDragEnd(e){if(!activeDrag)return;e.preventDefault();if(currentPiece){currentPiece.element.style.zIndex='';currentPiece.element.style.cursor='';delete currentPiece._dragOffsetX;delete currentPiece._dragOffsetY;currentPiece=null;}activeDrag=false;window.removeEventListener('mousemove',onDragMove);window.removeEventListener('mouseup',onDragEnd);window.removeEventListener('touchmove',onDragMove);window.removeEventListener('touchend',onDragEnd);window.removeEventListener('touchcancel',onDragEnd);}

  // ======================== INIT ========================
  function init(){
    buildPalette('blue',teamColors.blue.main);buildPalette('red',teamColors.red.main);
    createPieces();drawPitch();
    window.addEventListener('resize',handleResize);
    if(window.ResizeObserver)new ResizeObserver(handleResize).observe(fieldWrapper);
    window.addEventListener('load',handleResize);
    document.getElementById('blueFormationSelect').addEventListener('change',function(e){currentBlueFormation=e.target.value;applyFormation('blue',currentBlueFormation);fixGoalies();});
    document.getElementById('redFormationSelect').addEventListener('change',function(e){currentRedFormation=e.target.value;applyFormation('red',currentRedFormation);fixGoalies();});
    document.getElementById('resetBtn').addEventListener('click',resetPositions);
    document.getElementById('drawBtn').addEventListener('click',toggleDrawMode);
    document.getElementById('clearDrawBtn').addEventListener('click',clearAllDrawings);
    document.getElementById('saveBtn').addEventListener('click',saveImage);
    document.getElementById('btn3d').addEventListener('click',toggle3DMode);
    document.getElementById('zoomBtn').addEventListener('click',toggleZoom);
    document.getElementById('hideTeamSelect').addEventListener('change',applyTeamVisibility);
    document.getElementById('drawColorInput').addEventListener('input',function(e){drawColor=e.target.value;});
    document.querySelectorAll('.pen-size-btn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.pen-size-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');drawWidth=parseInt(btn.dataset.size);});});
    fieldWrapper.addEventListener('mousedown',startDrawing);fieldWrapper.addEventListener('mousemove',drawDrawing);fieldWrapper.addEventListener('mouseup',endDrawing);fieldWrapper.addEventListener('touchstart',startDrawing,{passive:false});fieldWrapper.addEventListener('touchmove',drawDrawing,{passive:false});fieldWrapper.addEventListener('touchend',endDrawing);fieldWrapper.addEventListener('touchcancel',endDrawing);
    document.body.style.touchAction='pan-y pan-x';
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
